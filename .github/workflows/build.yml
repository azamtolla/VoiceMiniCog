name: Build & Test

on:
  pull_request:
    branches: [main, v1-pilot]
  push:
    branches: [main, v1-pilot]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  swiftlint:
    name: SwiftLint
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Install SwiftLint
        run: brew install swiftlint

      - name: Run SwiftLint
        run: swiftlint lint --reporter github-actions-logging

  build:
    name: Xcode Build
    runs-on: macos-15
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Resolve simulator destination
        id: sim
        run: |
          # Pick the first available iPad simulator on this runner
          DEST=$(xcodebuild -scheme VoiceMiniCog -showdestinations 2>/dev/null \
            | grep 'platform:iOS Simulator' | grep -i 'iPad' | head -1 \
            | sed 's/.*{ //' | sed 's/ }$//')
          if [ -z "$DEST" ]; then
            echo "No iPad simulator found — falling back to generic"
            DEST="platform=iOS Simulator,name=Any iOS Simulator Device"
          fi
          echo "dest=$DEST" >> "$GITHUB_OUTPUT"
          echo "Using destination: $DEST"

      - name: Build (iPad Simulator)
        run: |
          xcodebuild build \
            -scheme VoiceMiniCog \
            -destination '${{ steps.sim.outputs.dest }}' \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}

  test:
    name: Unit Tests
    runs-on: macos-15
    needs: build
    steps:
      - uses: actions/checkout@v4

      - name: Select latest Xcode
        run: |
          LATEST=$(ls -d /Applications/Xcode*.app 2>/dev/null | sort -V | tail -1)
          echo "Using $LATEST"
          sudo xcode-select -s "$LATEST/Contents/Developer"
          xcodebuild -version

      - name: Resolve simulator destination
        id: sim
        run: |
          DEST=$(xcodebuild -scheme VoiceMiniCog -showdestinations 2>/dev/null \
            | grep 'platform:iOS Simulator' | grep -i 'iPad' | head -1 \
            | sed 's/.*{ //' | sed 's/ }$//')
          if [ -z "$DEST" ]; then
            DEST="platform=iOS Simulator,name=Any iOS Simulator Device"
          fi
          echo "dest=$DEST" >> "$GITHUB_OUTPUT"

      - name: Run Unit Tests
        run: |
          xcodebuild test \
            -scheme VoiceMiniCog \
            -destination '${{ steps.sim.outputs.dest }}' \
            -only-testing:VoiceMiniCogTests \
            -skipPackagePluginValidation \
            CODE_SIGNING_ALLOWED=NO \
            | xcpretty --color && exit ${PIPESTATUS[0]}
