<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
#video-container {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
video {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 0;
}
#status {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.6); font-family: -apple-system, sans-serif;
  font-size: 14px; padding: 6px 16px;
  background: rgba(0,0,0,0.4); border-radius: 20px;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  z-index: 10;
}
</style>
</head>
<body>
<div id="video-container">
  <div id="status">Connecting...</div>
</div>

<script src="https://unpkg.com/@daily-co/daily-js"></script>
<script>
// === TAVUS BRIDGE ===
// Custom Daily room page for MercyCognitive.
// Gives Swift full control via evaluateJavaScript.

let callObject = null;
let conversationId = null;
let isJoined = false;
let isMuted = true;      // Start muted — unmute on first sendEcho from app
let pendingEchos = [];   // Queue for echo requests that arrive before room join

const status = document.getElementById('status');
const container = document.getElementById('video-container');

function log(msg) {
  console.log('[TavusBridge] ' + msg);
  window.webkit?.messageHandlers?.tavusBridge?.postMessage(JSON.stringify({type:'log', message: msg}));
}

function notifySwift(eventType, data) {
  window.webkit?.messageHandlers?.tavusBridge?.postMessage(JSON.stringify({type: eventType, ...data}));
}

// === JOIN ROOM ===
async function joinRoom(roomUrl) {
  log('Joining: ' + roomUrl);
  status.textContent = 'Connecting...';

  // Extract conversation ID from URL
  const parts = roomUrl.split('/');
  conversationId = parts[parts.length - 1];

  callObject = Daily.createCallObject({
    url: roomUrl,
    userName: 'Patient',
    videoSource: true,
    audioSource: true,
    inputSettings: {
      video: {
        settings: {
          width: { ideal: 1280 },
          height: { ideal: 720 },
          frameRate: { ideal: 30, max: 30 },
          facingMode: 'user'
        }
      },
      audio: {
        settings: {
          echoCancellation: true,
          noiseSuppression: true,
          autoGainControl: true
        }
      }
    }
  });

  // === EVENT HANDLERS ===

  callObject.on('joined-meeting', async (evt) => {
    log('Joined meeting');
    status.textContent = '';
    notifySwift('joined', {});

    // === CLINICAL AUDIO SETUP ===

    // 1. Enable Daily.js noise cancellation — filters ambient noise
    //    (HVAC, chair squeaks, coughs) at the audio input level BEFORE
    //    Tavus VAD even hears it.
    try {
      await callObject.updateInputSettings({
        audio: {
          processor: { type: 'noise-cancellation' },
          settings: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        }
      });
      log('Audio input optimized: noise cancellation + echo + AGC');
    } catch(e) {
      log('Audio input optimization failed: ' + e.message);
    }

    // 1b. Request highest receive quality from the avatar's video stream
    try {
      await callObject.updateReceiveSettings({
        '*': { video: { layer: 2 } }
      });
      log('Receive quality set to highest layer');
    } catch(e) {
      log('Receive settings failed: ' + e.message);
    }

    // 1c. Optimize send settings (patient camera → Tavus)
    try {
      await callObject.updateSendSettings({
        video: {
          preset: 'quality-optimized',
          allowAdaptiveLayers: true
        }
      });
      log('Send quality set to quality-optimized with adaptive layers');
    } catch(e) {
      log('Send settings failed: ' + e.message);
    }

    // 2. Reduce turn-taking sensitivity as a second layer
    setSensitivity('low', 'low');
    log('Set clinical sensitivity: pause=low, interrupt=low');

    // 3. Mute mic and remote audio immediately — avatar must stay silent
    //    until the app sends the first sendEcho() command (user started assessment).
    //    This prevents the avatar's persona greeting from playing on the Home screen.
    callObject.setLocalAudio(false);
    log('Mic muted on join (waiting for assessment start)');

    // 4. Set global persona: neuropsychologist examiner
    sendContextUpdate('You are a board-certified clinical neuropsychologist administering a standardized cognitive assessment. VOICE STYLE: Calm, measured, professional. Speak at a moderate pace with clear enunciation. Your tone is warm but clinical — reassuring without being casual. Never use slang, jokes, or exclamation marks. Never say "awesome", "cool", "great job", or give performance feedback. RULES: 1) Do NOT speak until you receive an echo command. Stay completely silent until then. 2) Speak ONLY the text sent via echo commands — do not ad-lib. 3) If the patient speaks to you between questions, respond briefly and professionally: "Let us continue with the next part of the assessment." 4) Never provide hints, clues, or feedback on correctness. 5) Maintain a neutral, supportive demeanor throughout.');
    log('Set neuropsychologist persona context');

    // 5. Mark as joined and flush any pending echo requests
    isJoined = true;
    if (pendingEchos.length > 0) {
      log('Flushing ' + pendingEchos.length + ' pending echo(s)');
      // Only send the most recent one — earlier ones are stale
      const latest = pendingEchos[pendingEchos.length - 1];
      pendingEchos = [];
      sendEcho(latest);
    }
  });

  callObject.on('participant-joined', (evt) => {
    log('Participant joined: ' + evt.participant.session_id);
    updateVideoElements();
  });

  callObject.on('participant-updated', (evt) => {
    updateVideoElements();
  });

  callObject.on('participant-left', (evt) => {
    log('Participant left');
    updateVideoElements();
  });

  callObject.on('track-started', (evt) => {
    log('Track started: ' + evt.track.kind + ' from ' + evt.participant.session_id);
    updateVideoElements();
  });

  callObject.on('app-message', (evt) => {
    // Receive Tavus events (replica speaking, etc.)
    try {
      const data = typeof evt.data === 'string' ? JSON.parse(evt.data) : evt.data;
      log('App message: ' + (data.event_type || JSON.stringify(data).substring(0, 100)));
      notifySwift('tavusEvent', {event: data});

      // 3. Mic mute/unmute during avatar speech — prevents iPad speaker
      //    from feeding back into the mic and triggering the VAD.
      if (data.event_type === 'conversation.replica.started_speaking') {
        callObject.setLocalAudio(false);
        log('Mic muted (avatar speaking)');
      } else if (data.event_type === 'conversation.replica.stopped_speaking') {
        callObject.setLocalAudio(true);
        log('Mic unmuted (avatar stopped)');
      }
    } catch(e) {
      log('App message (raw): ' + JSON.stringify(evt.data).substring(0, 100));
    }
  });

  callObject.on('error', (evt) => {
    log('Error: ' + JSON.stringify(evt));
    status.textContent = 'Connection error';
    notifySwift('error', {message: JSON.stringify(evt)});
  });

  callObject.on('left-meeting', () => {
    log('Left meeting');
    notifySwift('left', {});
  });

  try {
    await callObject.join();
    log('Join successful');
  } catch(err) {
    log('Join failed: ' + err.message);
    status.textContent = 'Failed to connect';
    notifySwift('error', {message: err.message});
  }
}

// === VIDEO RENDERING ===
function updateVideoElements() {
  if (!callObject) return;

  const participants = callObject.participants();

  // Find remote participant (the Tavus replica)
  for (const [id, p] of Object.entries(participants)) {
    if (id === 'local') continue;

    if (p.tracks?.video?.persistentTrack) {
      let video = document.getElementById('remote-video');
      if (!video) {
        video = document.createElement('video');
        video.id = 'remote-video';
        video.autoplay = true;
        video.playsInline = true;
        // Remove status text when video appears
        status.style.display = 'none';
        container.appendChild(video);
      }
      const stream = new MediaStream([p.tracks.video.persistentTrack]);
      if (p.tracks.audio?.persistentTrack) {
        stream.addTrack(p.tracks.audio.persistentTrack);
      }
      if (video.srcObject !== stream) {
        video.srcObject = stream;
      }
    }
  }
}

// === INTERACTION API (called from Swift) ===

function sendInteraction(eventType, properties) {
  if (!callObject || !conversationId) {
    log('Cannot send interaction - not connected');
    return false;
  }
  const msg = {
    message_type: 'conversation',
    event_type: eventType,
    conversation_id: conversationId,
    properties: properties || {}
  };
  callObject.sendAppMessage(msg, '*');
  log('Sent: ' + eventType);
  return true;
}

// Overwrite the avatar's conversation context (tells it what phase we're in)
function sendContextUpdate(contextText) {
  return sendInteraction('conversation.overwrite_context', {
    context: contextText
  });
}

// Make the avatar speak exact text (bypasses LLM)
function sendEcho(text) {
  if (!isJoined) {
    log('Echo queued (not yet joined): ' + text.substring(0, 60) + '...');
    pendingEchos.push(text);
    return false;
  }

  // First echo = assessment has started. Unmute mic so avatar can hear patient.
  if (isMuted) {
    isMuted = false;
    callObject.setLocalAudio(true);
    log('Mic unmuted — assessment started');
  }

  log('Echo sending: ' + text.substring(0, 60) + '...');
  return sendInteraction('conversation.echo', {
    modality: 'text',
    text: text,
    inference_id: 'echo_' + Date.now(),
    done: true
  });
}

// Send a text response as if the LLM generated it
function sendRespond(text) {
  return sendInteraction('conversation.respond', {
    text: text,
    done: true
  });
}

// Interrupt the avatar (stop speaking)
function sendInterrupt() {
  return sendInteraction('conversation.interrupt', {});
}

// Adjust turn-taking sensitivity
function setSensitivity(pauseSensitivity, interruptSensitivity) {
  return sendInteraction('conversation.sensitivity', {
    participant_pause_sensitivity: pauseSensitivity,
    participant_interrupt_sensitivity: interruptSensitivity
  });
}

// Mute/unmute local mic (called from Swift or auto during avatar speech)
function setMicMuted(muted) {
  if (!callObject) return;
  callObject.setLocalAudio(!muted);
  log('Mic ' + (muted ? 'muted' : 'unmuted') + ' (explicit)');
}

// === CLEANUP ===
function leaveRoom() {
  if (callObject) {
    callObject.leave();
    callObject.destroy();
    callObject = null;
  }
}

log('TavusBridge loaded, waiting for joinRoom()');
</script>
</body>
</html>
