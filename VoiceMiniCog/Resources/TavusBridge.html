<!DOCTYPE html>
<html>
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
html, body { width: 100%; height: 100%; overflow: hidden; background: #000; }
#video-container {
  width: 100%; height: 100%;
  display: flex; align-items: center; justify-content: center;
  position: relative;
}
video {
  width: 100%; height: 100%;
  object-fit: cover;
  border-radius: 0;
}
#status {
  position: absolute; bottom: 20px; left: 50%; transform: translateX(-50%);
  color: rgba(255,255,255,0.6); font-family: -apple-system, sans-serif;
  font-size: 14px; padding: 6px 16px;
  background: rgba(0,0,0,0.4); border-radius: 20px;
  backdrop-filter: blur(10px); -webkit-backdrop-filter: blur(10px);
  z-index: 10;
}
</style>
</head>
<body>
<div id="video-container">
  <div id="status">Connecting...</div>
</div>

<!-- Pin Daily.js version for clinical stability — update deliberately, not on CDN push -->
<script src="https://unpkg.com/@daily-co/daily-js@0.70.0/dist/daily-iframe.js"></script>
<script>
// === TAVUS BRIDGE ===
// Custom Daily room page for MercyCognitive.
// Gives Swift full control via evaluateJavaScript.

// Use var (not let) so Web Inspector console can access state via window.*
var callObject = null;
var conversationId = null;
var isJoined = false;
var pendingEchos = [];   // Queue for echo requests that arrive before room join

// Serialize conversation.echo — Word Registration (and any burst) can fire many
// Swift echoes back-to-back; overlapping Tavus TTS freezes the replica video.
var echoTextQueue = [];
var echoInFlight = false;
var echoWatchdog = null;
var echoCounter = 0;     // Monotonic counter for inference_id (avoids same-ms collisions)
var firstEchoSent = false;  // True after the first echo is sent — until then,
                             // remote audio is gated at the MediaStream level to
                             // suppress the Tavus persona greeting on room join.

// Suppress false "unprompted speech" interrupts (see replica.started_speaking handler).
var lastOverwriteContextMs = 0;   // overwrite_context often precedes a spurious started_speaking before Swift's echo lands.
var lastEchoSlotReleasedMs = 0; // Between chained echoes, echoInFlight is briefly false while the next echo is still in flight on Tavus.

// Post-join interrupt guard — blocks all auto-interrupts for 5s after join.
// The silent audio unlock buffer + ambient mic noise can trigger
// user.started_speaking immediately, killing the greeting utterance.
var joinedAt = null;
const INTERRUPT_GUARD_MS = 5000;

function shouldAllowInterrupt() {
  if (!joinedAt) return false;
  if (Date.now() - joinedAt < INTERRUPT_GUARD_MS) {
    log('Auto-interrupt: blocked (within ' + INTERRUPT_GUARD_MS + 'ms guard window)');
    return false;
  }
  return true;
}

const status = document.getElementById('status');
const container = document.getElementById('video-container');

function log(msg) {
  console.log('[TavusBridge] ' + msg);
  window.webkit?.messageHandlers?.tavusBridge?.postMessage(JSON.stringify({type:'log', message: msg}));
}

function notifySwift(eventType, data) {
  window.webkit?.messageHandlers?.tavusBridge?.postMessage(JSON.stringify({type: eventType, ...data}));
}

// === JOIN ROOM ===
async function joinRoom(roomUrl) {
  log('Joining: ' + roomUrl);
  status.textContent = 'Connecting...';
  echoTextQueue = [];
  echoInFlight = false;
  pendingEchos = [];
  lastOverwriteContextMs = 0;
  lastEchoSlotReleasedMs = 0;
  echoCounter = 0;
  if (echoWatchdog) {
    clearTimeout(echoWatchdog);
    echoWatchdog = null;
  }

  // Clean up any existing call object before creating a new one
  // (prevents event listener accumulation if joinRoom is called without leaveRoom)
  if (callObject) {
    const old = callObject;
    callObject = null;
    try { old.destroy(); } catch (e) { log('Old callObject cleanup: ' + e.message); }
  }

  // Extract conversation ID from URL
  const parts = roomUrl.split('/');
  conversationId = parts[parts.length - 1];

  // Audio constraints (echoCancellation, noiseSuppression, autoGainControl) are
  // applied post-join via updateInputSettings — not at createCallObject level,
  // where inputSettings.audio.settings is not a valid Daily.js config path.
  callObject = Daily.createCallObject({
    url: roomUrl,
    userName: 'Patient',
    videoSource: false,   // Patient camera not needed — Tavus is one-way
    audioSource: true,    // (avatar → patient). Disabling video eliminates
                          // camera capture pipeline, freeing ~100-200MB.
  });

  // === EVENT HANDLERS ===

  callObject.on('joined-meeting', async (evt) => {
    log('Joined meeting');
    status.textContent = '';
    joinedAt = Date.now();
    notifySwift('joined', {});

    // === CRITICAL PATH (synchronous — must not depend on await) ===

    // 1. Mute mic on join. Remote audio is gated at the MediaStream level
    //    in updateVideoElements() (audio track not added until firstEchoSent).
    callObject.setLocalAudio(false);
    firstEchoSent = false;
    log('Mic muted + remote audio gated at MediaStream level (waiting for first echo)');

    // 2. Mark as joined and flush any pending echo requests
    isJoined = true;
    if (pendingEchos.length > 0) {
      log('Flushing ' + pendingEchos.length + ' pending echo(s)');
      const queued = pendingEchos;
      pendingEchos = [];
      for (const text of queued) {
        sendEcho(text);
      }
    }

    // 3. Reduce turn-taking sensitivity
    setSensitivity('low', 'low');
    log('Set clinical sensitivity: pause=low, interrupt=low');

    // 4. Set global persona: neuropsychologist examiner
    sendContextUpdate('You are a board-certified clinical neuropsychologist administering a standardized cognitive assessment. VOICE STYLE: Calm, measured, professional. Speak at a moderate pace with clear enunciation. Your tone is warm but clinical — reassuring without being casual. Never use slang, jokes, or exclamation marks. Never say "awesome", "cool", "great job", or give performance feedback. NEVER correct, grade, coach, or evaluate the patient\'s answers — no "right", "wrong", "close", "not quite", "actually", "good try", or pronunciation fixes. Do not repeat their answer back to judge it. RULES: 1) Do NOT speak until you receive an echo command. Stay completely silent until then. 2) Speak ONLY the text sent via echo commands — do not ad-lib. 3) If the patient speaks to you between echo commands, remain silent. Do not respond, acknowledge, or generate any speech unless you receive an echo command. 4) Never provide hints, clues, or feedback on correctness. 5) Maintain a neutral, supportive demeanor throughout.');
    log('Set neuropsychologist persona context');

    // 5. Greeting trigger removed — welcome SSML now includes "Hello!" as its
    //    first line. Audio is enabled by pumpEchoQueue on the first sendEcho
    //    from WelcomePhaseView (firstEchoSent gate at line 486).

    // === OPTIONAL ASYNC SETUP (may hang in WKWebView — must not block above) ===

    // 6. Enable Daily.js noise cancellation — filters ambient noise
    //    (HVAC, chair squeaks, coughs) at the audio input level.
    try {
      await callObject.updateInputSettings({
        audio: {
          processor: { type: 'noise-cancellation' },
          settings: {
            echoCancellation: true,
            noiseSuppression: true,
            autoGainControl: true
          }
        }
      });
      log('Audio input optimized: noise cancellation + echo + AGC');
    } catch(e) {
      log('Audio input optimization failed (non-fatal): ' + e.message);
    }

    // 7. Request lowest simulcast layer to minimize memory + bandwidth.
    try {
      await callObject.updateReceiveSettings({
        '*': { video: { layer: 0 } }
      });
      log('Receive quality set to lowest layer (memory conservation)');
    } catch(e) {
      log('Receive settings failed (non-fatal): ' + e.message);
    }

    log('joined-meeting handler complete');
  });

  callObject.on('participant-joined', (evt) => {
    log('Participant joined: ' + evt.participant.session_id);
    updateVideoElements();
  });

  callObject.on('participant-updated', (evt) => {
    updateVideoElements();
  });

  callObject.on('participant-left', (evt) => {
    log('Participant left');
    // Null srcObject before DOM removal — prevents Safari/WKWebView
    // WebMediaPlayer memory leak where the player persists indefinitely.
    const video = document.getElementById('remote-video');
    if (video) {
      video.pause();
      video.srcObject = null;
      video.remove();
    }
    updateVideoElements();
  });

  callObject.on('track-started', (evt) => {
    log('Track started: ' + evt.track.kind + ' from ' + evt.participant.session_id);
    updateVideoElements();
  });

  callObject.on('app-message', (evt) => {
    // Receive Tavus events (replica speaking, etc.)
    try {
      const data = typeof evt.data === 'string' ? JSON.parse(evt.data) : evt.data;
      log('App message: ' + (data.event_type || JSON.stringify(data).substring(0, 100)));
      notifySwift('tavusEvent', {event: data});

      // 3. Mic mute/unmute during avatar speech — prevents iPad speaker
      //    from feeding back into the mic and triggering the VAD.
      // === CLINICAL ECHO-ONLY ENFORCEMENT ===
      // Tavus's conversational AI generates automatic acknowledgments
      // ("okay", "got it", etc.) after user speech regardless of persona
      // instructions. In clinical assessment mode the avatar must speak
      // ONLY echoed prompts. Fire conversation.interrupt immediately
      // after user.stopped_speaking to preempt the LLM response.
      // Uses sendInteraction directly — NOT sendInterrupt() which would
      // clear the echo queue.
      if (data.event_type === 'conversation.user.stopped_speaking') {
        // Never interrupt mid-echo: speaker-to-mic bleed or a cough can still
        // surface as user.stopped after VAD; conversation.interrupt aborts the
        // clinician echo and can desync echoInFlight / freeze the replica until
        // the watchdog fires (especially during Word Registration chains).
        if (echoInFlight || echoTextQueue.length > 0) {
          log('Auto-interrupt: skipped (echo queued or in flight — do not cut scripted prompt)');
          return;
        }
        if (!shouldAllowInterrupt()) return;
        sendInteraction('conversation.interrupt', {});
        log('Auto-interrupt: suppressed LLM acknowledgment after patient speech');
      }

      if (data.event_type === 'conversation.replica.started_speaking') {
        // If no echo is in-flight, this is unprompted Tavus speech —
        // either the initial persona greeting on room join, or an LLM
        // acknowledgment that survived the user.stopped_speaking interrupt.
        // Suppress it immediately. This does NOT affect echoed prompts
        // because echoInFlight is true while an echo is being spoken.
        if (!echoInFlight && echoTextQueue.length === 0) {
          const now = Date.now();
          // Word Registration (and similar): Swift sends overwrite_context then
          // conversation.echo a few ms later. Tavus often emits started_speaking
          // with echoInFlight still false — interrupting here aborts the intro.
          if (now - lastOverwriteContextMs < 1200) {
            log('Auto-interrupt: skipped (recent overwrite_context — pre-echo pipeline)');
            return;
          }
          // Swift chains echoes on avatarDoneSpeaking; between segments echoInFlight
          // is false while Tavus reconnects audio, then started_speaking fires before
          // the next sendEcho reaches this queue — do not interrupt that gap.
          if (now - lastEchoSlotReleasedMs < 1200) {
            log('Auto-interrupt: skipped (post-stopped_speaking gap — chained echo inbound)');
            return;
          }
          if (!shouldAllowInterrupt()) return;
          sendInteraction('conversation.interrupt', {});
          log('Auto-interrupt: suppressed unprompted Tavus speech (no echo in-flight)');
        } else {
          callObject.setLocalAudio(false);
          log('Mic muted (avatar speaking)');
        }
      } else if (data.event_type === 'conversation.replica.stopped_speaking') {
        releaseEchoSlot();
        // Only unmute mic if no more echoes are queued — prevents
        // inter-word mic bounce during registration's rapid echo chain
        // from capturing avatar audio tail and contaminating ASR.
        if (echoTextQueue.length === 0 && !echoInFlight) {
            callObject.setLocalAudio(true);
            log('Mic unmuted (avatar stopped, queue empty)');
        } else {
            log('Mic stays muted (more echoes queued)');
        }
      }
    } catch(e) {
      log('App message (raw): ' + JSON.stringify(evt.data).substring(0, 100));
    }
  });

  // === CONNECTION LIFECYCLE (diagnostic) ===

  callObject.on('network-connection', (evt) => {
    // Fires when Daily detects connection state changes — before left-meeting.
    // evt.type: 'connected' | 'interrupted' | 'quality-low' etc.
    // evt.reason: string describing the cause.
    log('Network connection: ' + JSON.stringify(evt));
    notifySwift('error', {message: 'network-connection: ' + JSON.stringify(evt)});
  });

  callObject.on('nonfatal-error', (evt) => {
    log('Non-fatal error: ' + JSON.stringify(evt).substring(0, 200));
    notifySwift('error', {message: 'nonfatal-error: ' + JSON.stringify(evt).substring(0, 200)});
  });

  callObject.on('error', (evt) => {
    log('FATAL Error: ' + JSON.stringify(evt));
    status.textContent = 'Connection error';
    notifySwift('error', {message: JSON.stringify(evt)});
  });

  callObject.on('left-meeting', () => {
    log('Left meeting — isJoined was: ' + isJoined);
    isJoined = false;
    notifySwift('left', {});
  });

  callObject.on('call-instance-destroyed', () => {
    log('Call instance destroyed');
    callObject = null;
  });

  try {
    await callObject.join();
    log('Join successful');
  } catch(err) {
    log('Join failed: ' + err.message);
    status.textContent = 'Failed to connect';
    notifySwift('error', {message: err.message});
  }
}

// === VIDEO RENDERING ===
// `participant-updated` fires often (e.g. while the mic is open). Building a new
// MediaStream each time makes `video.srcObject !== stream` always true, so WebKit
// rebinds the element → black frames / dropped AV sync. Only replace when tracks change.
function updateVideoElements() {
  if (!callObject) return;

  const participants = callObject.participants();

  for (const [id, p] of Object.entries(participants)) {
    if (id === 'local') continue;

    const vidTrack = p.tracks?.video?.persistentTrack;
    if (!vidTrack) continue;

    let video = document.getElementById('remote-video');
    if (!video) {
      video = document.createElement('video');
      video.id = 'remote-video';
      video.autoplay = true;
      video.playsInline = true;
      video.setAttribute('playsinline', '');
      video.setAttribute('webkit-playsinline', '');  // legacy iOS WebKit
      status.style.display = 'none';
      container.appendChild(video);
    }

    // Gate remote audio at the MediaStream level: only include the audio
    // track after firstEchoSent. This suppresses the Tavus persona greeting
    // without requiring admin permissions (unlike updateParticipant setAudio).
    const rawAudioTrack = p.tracks?.audio?.persistentTrack;
    const audioTrack = (rawAudioTrack && firstEchoSent) ? rawAudioTrack : null;
    const curStream = video.srcObject;
    const curVideo = curStream?.getVideoTracks?.()?.[0];
    const curAudio = curStream?.getAudioTracks?.()?.[0];

    const sameVideo = curVideo && curVideo.id === vidTrack.id;
    const sameAudio =
      (!audioTrack && !curAudio) ||
      (audioTrack && curAudio && curAudio.id === audioTrack.id);

    if (sameVideo && sameAudio) {
      break;
    }

    // Participant snapshot sometimes omits audio briefly; keep existing audio track.
    if (sameVideo && curStream && !rawAudioTrack && curAudio) {
      break;
    }

    if (sameVideo && curStream) {
      if (audioTrack && (!curAudio || curAudio.id !== audioTrack.id)) {
        if (curAudio) curStream.removeTrack(curAudio);
        curStream.addTrack(audioTrack);
      } else if (!audioTrack && curAudio) {
        // firstEchoSent is false — remove audio track to re-gate
        curStream.removeTrack(curAudio);
      }
      break;
    }

    const stream = new MediaStream();
    stream.addTrack(vidTrack);
    if (audioTrack) stream.addTrack(audioTrack);
    video.srcObject = stream;
    video.play?.()?.catch(err => {
      log('video.play() rejected: ' + err.message);
      notifySwift('error', { message: 'video-play-failed: ' + err.message });
    });
    break;
  }
}

// === INTERACTION API (called from Swift) ===

function sendInteraction(eventType, properties) {
  if (!callObject || !conversationId) {
    log('Cannot send interaction (' + eventType + ') - not connected (callObject=' + !!callObject + ', conversationId=' + !!conversationId + ')');
    return false;
  }
  const msg = {
    message_type: 'conversation',
    event_type: eventType,
    conversation_id: conversationId,
    properties: properties || {}
  };
  callObject.sendAppMessage(msg, '*');
  log('Sent: ' + eventType);
  return true;
}

// Overwrite the avatar's conversation context (tells it what phase we're in)
function sendContextUpdate(contextText) {
  lastOverwriteContextMs = Date.now();
  return sendInteraction('conversation.overwrite_llm_context', {
    context: contextText
  });
}

function releaseEchoSlot() {
  // Ignore duplicate / late stopped_speaking when nothing is awaiting (avoids
  // clearing the next segment's slot and re-overlapping echoes).
  if (!echoInFlight) {
    return;
  }
  if (echoWatchdog) {
    clearTimeout(echoWatchdog);
    echoWatchdog = null;
  }
  echoInFlight = false;
  pumpEchoQueue();
  lastEchoSlotReleasedMs = Date.now();
}

function pumpEchoQueue() {
  if (!callObject || !conversationId || !isJoined) return;
  if (echoInFlight) return;
  if (echoTextQueue.length === 0) return;

  const text = echoTextQueue.shift();
  echoInFlight = true;

  // On the very first echo, rebuild the MediaStream to include the audio
  // track. This was gated on join to suppress the Tavus persona greeting.
  if (!firstEchoSent) {
    firstEchoSent = true;
    updateVideoElements();  // rebuilds stream with audio track now included
    log('Remote audio enabled via MediaStream (first echo — assessment started)');
  }

  try {
    callObject.setLocalAudio(false);
    log('Mic muted before echo (serialized queue)');
  } catch (e) {
    log('Pre-echo mute failed: ' + e.message);
  }

  if (echoWatchdog) clearTimeout(echoWatchdog);
  // Short scripted clips (orientation, registration words): tight watchdog.
  // Welcome uses long SSML (<speak>…</speak>); Tavus often delays `stopped_speaking`
  // until the full TTS finishes — a 10s watchdog re-queues the same echo and/or
  // clears echoInFlight while audio is still playing, which triggers false
  // "unprompted speech" auto-interrupts and cuts the replica off mid-sentence.
  const longFormEcho =
    text.indexOf('<speak') !== -1 ||
    text.length > 280;
  // Long-form SSML echoes (welcome intro) can take 60-70s with breaks.
  // 90s gives generous headroom without the old 120s freeze problem.
  // Short clips (individual words, prompts) use a tight 10s watchdog.
  const watchdogMs = longFormEcho ? 90000 : 10000;

  echoWatchdog = setTimeout(() => {
    log('Echo watchdog: no stopped_speaking after ' + watchdogMs + 'ms — releasing slot + notifying Swift');
    echoWatchdog = null;
    releaseEchoSlot();
    // Surface a brief UI indicator so clinicians know why the avatar stalled.
    notifySwift('echoWatchdogFired', { timeoutMs: watchdogMs, text: text.substring(0, 80) });
    // Synthesize a stopped_speaking notification so the Swift continuation
    // resumes immediately instead of hanging until the 12-second safety task.
    // Without this, a dropped Tavus event causes a perceived freeze equal to
    // the safety timeout duration.
    notifySwift('tavusEvent', {event: {event_type: 'conversation.replica.stopped_speaking'}});
    // Unmute mic — the stopped_speaking handler won't run for this echo since
    // the watchdog fired instead, so we must unmute here explicitly.
    if (echoTextQueue.length === 0 && !echoInFlight) {
      callObject.setLocalAudio(true);
      log('Mic unmuted (watchdog, queue empty)');
    }
  }, watchdogMs);

  log('Echo sending (serialized): ' + text.substring(0, 80) + '...');
  sendInteraction('conversation.echo', {
    modality: 'text',
    text: text,
    inference_id: 'echo_' + (++echoCounter),
    done: 'true'
  });
}

// Make the avatar speak exact text (bypasses LLM). Queued so bursts never overlap.
function sendEcho(text) {
  if (!isJoined) {
    log('Echo queued (not yet joined): ' + text.substring(0, 60) + '...');
    pendingEchos.push(text);
    return false;
  }
  echoTextQueue.push(text);
  log('Echo enqueued, depth=' + echoTextQueue.length);
  pumpEchoQueue();
  return true;
}

// Send a text response as if the LLM generated it
function sendRespond(text) {
  return sendInteraction('conversation.respond', {
    text: text
  });
}

// Interrupt the avatar (stop speaking)
function sendInterrupt() {
  echoTextQueue = [];
  echoInFlight = false;
  if (echoWatchdog) {
    clearTimeout(echoWatchdog);
    echoWatchdog = null;
  }
  log('Interrupt: cleared echo queue and released echo slot');
  return sendInteraction('conversation.interrupt', {});
}

// Adjust turn-taking sensitivity
function setSensitivity(pauseSensitivity, interruptSensitivity) {
  return sendInteraction('conversation.sensitivity', {
    participant_pause_sensitivity: pauseSensitivity,
    participant_interrupt_sensitivity: interruptSensitivity
  });
}

// Mute/unmute local mic (called from Swift or auto during avatar speech)
function setMicMuted(muted) {
  if (!callObject) return;
  callObject.setLocalAudio(!muted);
  log('Mic ' + (muted ? 'muted' : 'unmuted') + ' (explicit)');
}

// === CLEANUP ===
async function leaveRoom() {
  echoTextQueue = [];
  pendingEchos = [];
  echoInFlight = false;
  if (echoWatchdog) {
    clearTimeout(echoWatchdog);
    echoWatchdog = null;
  }
  // Null srcObject before DOM removal — prevents Safari/WKWebView memory leak
  const video = document.getElementById('remote-video');
  if (video) {
    video.pause();
    video.srcObject = null;
    video.remove();
  }
  if (callObject) {
    const co = callObject;
    callObject = null;        // nil out before async work to prevent re-entry
    isJoined = false;
    try {
      await co.leave();
    } catch (e) {
      log('leave() error (may already be left): ' + e.message);
    }
    co.destroy();
  }
}

// === WEB AUDIO UNLOCK FOR iOS ===
// iOS suspends Web Audio API contexts by default. Daily.co uses Web Audio
// internally for audio processing. This function must be called from a user
// gesture (tap) before joinRoom() to unlock audio output on the device.
async function unlockAudio() {
  try {
    const AudioContextClass = window.AudioContext || window.webkitAudioContext;
    if (!AudioContextClass) {
      log('[unlockAudio] Web Audio API not available');
      return false;
    }

    const ctx = new AudioContextClass();
    log('[unlockAudio] AudioContext state: ' + ctx.state);

    if (ctx.state === 'suspended') {
      await ctx.resume();
      log('[unlockAudio] AudioContext resumed from suspended state');
    }

    // Play a silent buffer to fully unlock iOS audio pipeline
    const buffer = ctx.createBuffer(1, 1, 22050);
    const source = ctx.createBufferSource();
    source.buffer = buffer;
    source.connect(ctx.destination);
    source.start(0);

    log('[unlockAudio] Silent buffer played - Web Audio unlocked');
    return true;
  } catch (error) {
    log('[unlockAudio] Failed: ' + error.message);
    return false;
  }
}

log('TavusBridge loaded, waiting for joinRoom()');
</script>
</body>
</html>
